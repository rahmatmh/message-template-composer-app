<style>

/* ======================================================
   Mesaage Template Composer
   Style Version 2.0
   ====================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

h3{

    margin-top:25px;

    margin-bottom:12px;

    color:#1565C0;

    font-size:18px;

    border-left:5px solid #1565C0;

    padding-left:10px;

}

body{

    font-family:Arial, Helvetica, sans-serif;

    color:#333;

    background-image:
        linear-gradient(
            rgba(255,255,255,.85),
            rgba(255,255,255,.88)
        ),
        url("https://masjidkarangkajen.com/Nitip_file/Images_rahmatmh/Ruang_Perkuliahan_Fakultas_Psikologi_dan_Fakultas_Ilmu_Sosial_Budaya_dengan_Batik_UII.png");

    background-size:cover;

    background-position:center;

    background-attachment:fixed;

    background-repeat:no-repeat;

}

/* ======================================================
   HEADER
   ====================================================== */

header{
    background:#1565C0;
    color:#fff;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

header h1{
    font-size:28px;
    margin-bottom:6px;
}

header p{
    opacity:.9;
    font-size:15px;
}

/* ======================================================
   CONTENT
   ====================================================== */

main{
    max-width:1000px;
    margin:auto;
    padding:30px 20px;
    min-height:75vh;
}

/* ======================================================
   CARD
   ====================================================== */

.card{
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:10px;
}

.card p{
    color:#666;
    margin-bottom:20px;
    line-height:1.6;
}

/* ======================================================
   MENU GRID
   ====================================================== */

.menu-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

    gap:20px;

    margin-top:25px;

}

/* ======================================================
   MENU BUTTON
   ====================================================== */

.menu-btn{

    background:#fff;

    border:1px solid #e5e7eb;

    border-radius:15px;

    padding:22px;

    cursor:pointer;

    transition:.25s ease;

    text-align:left;

    box-shadow:0 2px 10px rgba(0,0,0,.05);

}

.menu-btn:hover{

    background:#f5faff;

    border-color:#1565C0;

    transform:translateY(-6px);

    box-shadow:0 12px 30px rgba(0,0,0,.18);

}

.menu-icon{

    width:42px;

    height:42px;

    display:flex;

    align-items:center;

    justify-content:center;

    margin-bottom:15px;

    font-size:36px;

}

/* ======================================================
   MENU LOGO
====================================================== */

.menu-logo{

    width:42px;
    height:42px;

    object-fit:contain;

    display:block;

}

.menu-title{

    font-size:20px;

    font-weight:bold;

    margin-bottom:5px;

    color:#1565C0;

}

.menu-subtitle{

    font-size:14px;

    color:#666;

}

/* ======================================================
   BUTTON
   ====================================================== */

button{

    font-family:inherit;

}

.btn{

    background:#1565C0;

    color:white;

    border:none;

    border-radius:10px;

    padding:12px 22px;

    cursor:pointer;

    transition:.25s;

    font-size:15px;

    font-weight:bold;

}

.btn:hover{

    background:#0D47A1;

}

/* ======================================================
   TEXTAREA
   ====================================================== */

textarea{

    width:100%;

    min-height:180px;

    resize:vertical;

    padding:15px;

    border:1px solid #d6d6d6;

    border-radius:12px;

    font-size:15px;

    font-family:inherit;

    line-height:1.7;

    transition:.2s;

}

textarea:focus{

    outline:none;

    border-color:#1565C0;

    box-shadow:0 0 0 3px rgba(21,101,192,.15);

}

/* ======================================================
   INPUT
   ====================================================== */

input[type=text]{

    width:100%;

    padding:10px;

    border:1px solid #ccc;

    border-radius:8px;

}

/* ======================================================
   CHECKBOX
   ====================================================== */

.checkbox-group{

    display:flex;

    flex-direction:column;

    gap:12px;

    margin:20px 0;

}

.checkbox-group label{

    cursor:pointer;

}

.checkbox-group label{

    display:flex;

    align-items:center;

    gap:10px;

    padding:8px 5px;

}

/* ======================================================
   PREVIEW
   ====================================================== */

.preview{

    background:#fafafa;

    border:1px solid #ddd;

    border-radius:10px;

    padding:15px;

    min-height:220px;

    white-space:pre-wrap;

    line-height:1.8;

}

/* ======================================================
   ACTION BUTTON
   ====================================================== */

.action{

    display:flex;

    justify-content:flex-end;

    gap:12px;

    margin-top:25px;

}

/* ======================================================
   FOOTER
   ====================================================== */

footer{

    background:#eee;

    padding:15px;

    text-align:center;

    color:#666;

    font-size:14px;

}

/* ======================================================
   MOBILE
   ====================================================== */

@media(max-width:768px){

header h1{

    font-size:24px;

}

.card{

    animation:fadeIn .35s ease;

    background:#fff;

    border-radius:18px;

    padding:30px;

    box-shadow:0 8px 25px rgba(0,0,0,.08);

}

@keyframes fadeIn{

    from{

        opacity:0;
        transform:translateY(15px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

.menu-grid{

    grid-template-columns:1fr;

}

.menu-icon{

    font-size:34px;

}

}

.auto-grow{

    min-height:42px;

    overflow:hidden;

    resize:none;

}

</style>
