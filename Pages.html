/* ============================================================
   WHATSAPP - KIRIM PESAN
   FIX #1: textarea id="message" (bukan "emailMessage")
   FIX #2: radio name="formatSalam" value="arabic" (bukan "emailLanguage")
============================================================ */
function waSendPage(){
return `
<div class="card">

    <button class="btn" onclick="navigate('home')">🏠 Home</button>

    <h2 style="margin-top:20px;">📤 WhatsApp - Kirim Pesan</h2>

    <p>Pilih format salam kemudian tuliskan isi pesan.</p>

    <hr><br>

    <h3>Format Salam</h3>

    <div class="checkbox-group">

        <label>
            <input type="radio" name="formatSalam" value="latin" checked>
            Latin
        </label>

        <!-- FIX: name="formatSalam" value="arabic" -->
        <label>
            <input type="radio" name="formatSalam" value="arabic">
            🇸🇦 العربية
        </label>

    </div>

    <br>

    <h3>Pembuka</h3>

    <div class="checkbox-group">

        <label>
            <input type="checkbox" id="opening" checked>
            Salam Pembuka
        </label>

        <label>
            <input type="checkbox" id="basmalah">
            Basmalah
        </label>

    </div>

    <br>

    <h3>Isi Pesan</h3>

    <!-- FIX: id="message" agar terbaca oleh Generator.value("message") -->
    <textarea
        id="message"
        placeholder="Tulis isi pesan..."></textarea>

    <br><br>

    <h3>Penutup</h3>

    <div class="checkbox-group">

        <label>
            <input type="checkbox" id="jazakallah">
            Jazakumullahu khairan katsiran
        </label>

        <label>
            <input type="checkbox" id="closing" checked>
            Salam Penutup
        </label>

    </div>

    <br>

    <h3>Hasil Template</h3>

    <textarea id="preview" readonly></textarea>

    <div class="action">
        <button class="btn" onclick="copyClipboard()">📋 Copy</button>
        <button class="btn" onclick="clearForm()">🗑 Bersihkan</button>
    </div>

</div>
`;
}

/* ============================================================
   WHATSAPP - BALAS PESAN

function waReplyPage(){

        <button class="btn" onclick="clearForm()">🗑 Bersihkan</button>
    </div>

</div>
`;
}


/* ============================================================

============================================================ */
function emailSendPage(){
return `

<textarea id="city" rows="1" class="auto-grow"

<textarea id="preview" readonly></textarea>

<div class="action">
    <button class="btn" onclick="copyClipboard()">📋 Copy</button>
    <button class="btn" onclick="clearForm()">🗑 Bersihkan</button>
</div>

</div>
`;
}
